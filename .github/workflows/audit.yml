name: Site audit

on:
  schedule:
    # Sunday 21:00 UTC = Monday 09:00 NZST (winter) / 10:00 NZDT (summer)
    - cron: "0 21 * * 0"
  workflow_dispatch: # allow manual trigger via the Actions tab

permissions:
  contents: write # so the workflow can commit updated data back to the repo

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run audit
        run: python3 marketing-audit.py

      - name: Copy dashboard to index.html (so GitHub Pages serves it at root)
        run: cp marketing-audit-dashboard.html index.html

      - name: Commit updated data + dashboard
        run: |
          git config user.name "site-audit-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add marketing-audit-data.json audit-history.json \
                  marketing-audit-dashboard.html marketing-audit-report.html \
                  index.html
          if git diff --staged --quiet; then
            echo "No changes to commit (audit produced same results as last run)"
          else
            git commit -m "Weekly audit run — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
